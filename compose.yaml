name: tennis-analyzer
services:
  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: ${ENV_FILE:-.env}
    depends_on:
      postgres: {condition: service_healthy}
    volumes: [job-data:/app/data, ./models:/app/models:ro]
    restart: "no"
  web:
    build: .
    container_name: tennis-web
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env}
    depends_on:
      migrate: {condition: service_completed_successfully}
      redis: {condition: service_healthy}
    ports: ["127.0.0.1:8000:8000"]
    volumes: [job-data:/app/data, ./models:/app/models:ro]
    networks: [default, proxy]
    healthcheck: {test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"], interval: 30s, timeout: 5s, retries: 3}
  worker:
    build: .
    restart: unless-stopped
    env_file: ${ENV_FILE:-.env}
    command: ["rq", "worker", "--url", "redis://redis:6379/0", "--worker-ttl", "420", "analysis"]
    depends_on:
      migrate: {condition: service_completed_successfully}
      redis: {condition: service_healthy}
    volumes: [job-data:/app/data, ./models:/app/models:ro]
    deploy: {replicas: 1}
  postgres:
    image: postgres:17.2-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tennis}
      POSTGRES_USER: ${POSTGRES_USER:-tennis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes: [postgres-data:/var/lib/postgresql/data]
    networks:
      default:
        aliases: [tennis-postgres]
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"], interval: 10s, timeout: 5s, retries: 10}
  redis:
    image: redis:7.4.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis-data:/data]
    healthcheck: {test: ["CMD", "redis-cli", "ping"], interval: 10s, timeout: 5s, retries: 10}
volumes:
  postgres-data:
  redis-data:
  job-data:
networks:
  proxy:
    external: true
